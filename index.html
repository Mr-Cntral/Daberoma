<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <title>Para mi Dani</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Raleway:wght@200;300&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #07091a
    }

    /* ======= ESTRELLAS ======= */
    #stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle ease-in-out infinite alternate
    }

    @keyframes twinkle {
      from {
        opacity: .08
      }

      to {
        opacity: .85
      }
    }

    /* ======= INTRO ======= */
    #intro {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 55%, #151a44 0%, #07091a 75%);
      transition: opacity 1.4s ease, visibility 1.4s ease;
    }

    #intro.out {
      opacity: 0;
      visibility: hidden;
      pointer-events: none
    }

    #intro-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(1.8rem, 7vw, 3rem);
      color: #e8c96a;
      letter-spacing: .14em;
      margin-bottom: .3em;
      text-align: center;
    }

    #intro-sub {
      font-family: 'Raleway', sans-serif;
      font-weight: 200;
      font-size: clamp(.7rem, 3vw, .9rem);
      color: rgba(255, 255, 255, .35);
      letter-spacing: .3em;
      text-transform: uppercase;
      margin-bottom: 3.5rem;
    }

    #btn {
      position: relative;
      overflow: hidden;
      background: transparent;
      border: 1px solid rgba(232, 201, 106, .55);
      color: #e8c96a;
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      font-size: clamp(.8rem, 3.5vw, 1rem);
      letter-spacing: .4em;
      text-transform: uppercase;
      padding: 1.1em 3.2em;
      cursor: pointer;
      border-radius: 2px;
      transition: color .45s, border-color .45s;
    }

    #btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: #e8c96a;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform .45s ease;
      z-index: -1;
    }

    #btn:hover {
      color: #07091a;
      border-color: #e8c96a
    }

    #btn:hover::after {
      transform: scaleX(1)
    }

    /* ======= ESCENA ======= */
    #scene {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
      background: radial-gradient(ellipse at 50% 65%, #0f1540 0%, #07091a 100%);
    }

    /* ======= GIRASOLES ======= */
    #flowers {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden
    }

    .sf {
      position: absolute;
      bottom: -180px;
      will-change: transform, opacity;
      animation: sway linear infinite;
      opacity: 0;
    }

    @keyframes sway {
      0% {
        transform: translateY(0) translateX(0) rotate(0deg);
        opacity: 0
      }

      6% {
        opacity: .88
      }

      20% {
        transform: translateY(-20vh) translateX(18px) rotate(6deg)
      }

      35% {
        transform: translateY(-35vh) translateX(-14px) rotate(-4deg)
      }

      50% {
        transform: translateY(-50vh) translateX(22px) rotate(7deg)
      }

      65% {
        transform: translateY(-65vh) translateX(-18px) rotate(-5deg)
      }

      80% {
        transform: translateY(-80vh) translateX(12px) rotate(4deg)
      }

      92% {
        opacity: .7
      }

      100% {
        transform: translateY(-112vh) translateX(var(--dx)) rotate(var(--dr));
        opacity: 0
      }
    }

    /* ======= CARTA ======= */
    #wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.8rem 1rem 3rem;
    }

    #box {
      width: 100%;
      max-width: 620px;
      max-height: 88vh;
      overflow-y: auto;
      scrollbar-width: none;
      padding: 2rem 1.6rem;
      background: rgba(7, 9, 26, .6);
      border: 1px solid rgba(232, 201, 106, .16);
      border-radius: 4px;
      backdrop-filter: blur(8px);
      position: relative;
      z-index: 5;
    }

    #box::-webkit-scrollbar {
      display: none
    }

    #date {
      font-family: 'Raleway', sans-serif;
      font-weight: 200;
      font-size: clamp(.6rem, 2.5vw, .75rem);
      color: rgba(232, 201, 106, .45);
      letter-spacing: .3em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    #text {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1.05rem, 4vw, 1.3rem);
      line-height: 1.95;
      color: #f5e9c8;
      min-height: 2em;
    }

    #cur {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: #e8c96a;
      vertical-align: middle;
      margin-left: 3px;
      animation: blink .85s step-end infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0
      }
    }

    #hint {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Raleway', sans-serif;
      font-weight: 200;
      font-size: .62rem;
      letter-spacing: .28em;
      color: rgba(232, 201, 106, .28);
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 1s;
      pointer-events: none;
    }

    /* Audio */
    #yt {
      display: none
    }
  </style>
</head>

<body>

  <!-- Estrellas -->
  <div id="stars"></div>

  <!-- INTRO -->
  <div id="intro">
    <p id="intro-title">Para mi Dani</p>
    <p id="intro-sub">Hoy es nuestro dia</p>
    <button id="btn" onclick="startExperience()">Abrir</button>
  </div>

  <!-- ESCENA -->
  <div id="scene">
    <div id="flowers"></div>
    <div id="wrap">
      <div id="box">
        <div id="date">23 de Abril, 2026</div>
        <div id="text"><span id="cur"></span></div>
      </div>
    </div>
    <div id="hint">Desliza para leer</div>
  </div>

  <!-- Audio nativo -->
  <audio id="music" src="musica.webm" preload="auto"></audio>

  <script>
    /* ===================== CONFIGURACION ===================== */
    const LETTER = `Altos y bajos marcan los días, la temperatura sube y cae con prisa, y aun así este tiempo hermoso parece infinito, las palabras no alcanzan a contener lo que siento, pero las tuyas siempre llegan con una claridad dulce y necesaria, no sé en qué momento llegamos aquí ni hacia dónde nos llevará el futuro, solo sé que mis ojos fueron afortunados al encontrarte y que esta historia merece ser vivida sin miedo, incluso cuando dudo de mí, incluso cuando me pierdo, tu paciencia se vuelve refugio y dirección, intento mejorar, avanzar, sostener este ritmo que juntos creamos, mis recuerdos se agitan como una melodía que encuentra en ti su armonía perfecta, tú traes luz, traes calma, traes ese calor que mi piel reconoce y extraña cuando no estás, y en medio de todo comprendo que esto no es casualidad ni ilusión, es una fuerza real que nos empuja a elegirnos cada día, a construir con intención y ternura, a imaginar un mañana donde cada decisión nos acerque más, donde una casa se llene de risas pequeñas y silencios compartidos, porque amarte no es solo sentir, es entender que en ti encontré hogar, paz, destino y una razón profunda para creer que lo más bonito de mi vida no es un recuerdo sino todo lo que aún nos queda por vivir juntos mi Dani, como si nuestras historias hubieran estado esperando este instante para finalmente encontrarse y comenzar a escribirse juntas`;

    const CHAR_MS = 125;   // ms por caracter
    const VID_ID = 'awuicQi36J4';
    const GOLDEN = 137.508 * Math.PI / 180;

    /* ===================== ESTRELLAS ===================== */
    (function () {
      const c = document.getElementById('stars');
      for (let i = 0; i < 100; i++) {
        const d = document.createElement('div');
        d.className = 'star';
        const s = Math.random() * 2.2 + .3;
        d.style.cssText = `width:${s}px;height:${s}px;left:${Math.random() * 100}%;top:${Math.random() * 100}%;animation-duration:${2 + Math.random() * 3.5}s;animation-delay:${Math.random() * 5}s`;
        c.appendChild(d);
      }
    })();

    /* ===================== SVG GIRASOL ===================== */
    function sunflowerSVG(type) {
      const blue = type === 'blue';
      // Colores
      const P1 = blue ? '#3949ab' : '#fdd835';   // petal principal
      const P2 = blue ? '#1a237e' : '#f9a825';   // petal sombra
      const P3 = blue ? '#5c6bc0' : '#fff176';   // brillo petal
      const C1 = blue ? '#0d1b6e' : '#3e2723';   // centro exterior
      const C2 = blue ? '#060d3a' : '#1b0000';   // centro interior
      const DOT = blue ? 'rgba(160,185,255,.18)' : 'rgba(255,240,120,.15)';

      const PETALS = 14;
      let outer = '', inner = '', seeds = '';

      // Pétalos externos — elipses con bordes suaves
      for (let i = 0; i < PETALS; i++) {
        const a = (360 / PETALS) * i;
        outer += `<ellipse rx="7.5" ry="25" fill="${P1}" stroke="${P2}" stroke-width=".6" opacity=".95"
      transform="rotate(${a}) translate(0,-36)"/>`;
      }
      // Pétalos internos (capa detrás, más cortos)
      for (let i = 0; i < PETALS; i++) {
        const a = (360 / PETALS) * i + (360 / PETALS / 2);
        inner += `<ellipse rx="5" ry="17" fill="${P2}" stroke="${P2}" stroke-width=".3" opacity=".7"
      transform="rotate(${a}) translate(0,-28)"/>`;
      }
      // Patrón espiral dorada para las semillas
      for (let i = 0; i < 55; i++) {
        const r = Math.sqrt(i) * 2.4;
        const ang = i * GOLDEN;
        const x = (r * Math.cos(ang)).toFixed(1);
        const y = (r * Math.sin(ang)).toFixed(1);
        if (r < 19) seeds += `<circle cx="${x}" cy="${y}" r="1.1" fill="${DOT}"/>`;
      }
      // Reflejo
      const shine = `<ellipse cx="-7" cy="-9" rx="5" ry="3.5" fill="${blue ? 'rgba(150,170,255,.22)' : 'rgba(255,255,180,.25)'}" transform="rotate(-35)"/>`;

      return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="-68 -68 136 136" style="width:100%;height:100%">
    <g>${inner}</g>
    <g>${outer}</g>
    <circle r="22" fill="${C1}"/>
    <circle r="17" fill="${C2}"/>
    <g>${seeds}</g>
    ${shine}
  </svg>`;
    }

    /* ===================== FLOTAR GIRASOLES ===================== */
    function spawnFlower() {
      const layer = document.getElementById('flowers');
      const types = ['yellow', 'blue', 'yellow', 'blue', 'yellow', 'yellow', 'blue'];
      const type = types[Math.floor(Math.random() * types.length)];
      const size = 90 + Math.random() * 70;
      const el = document.createElement('div');
      el.className = 'sf';
      const dx = (Math.random() * 100 - 50).toFixed(0) + 'px';
      const dr = (Math.random() * 60 - 30).toFixed(0) + 'deg';
      const dur = (14 + Math.random() * 9).toFixed(1) + 's';
      const delay = (Math.random() * 2).toFixed(2) + 's';
      const left = (Math.random() * 92).toFixed(1) + '%';
      el.style.cssText = `left:${left};width:${size}px;height:${size}px;--dx:${dx};--dr:${dr};animation-duration:${dur};animation-delay:${delay}`;
      el.innerHTML = sunflowerSVG(type);
      layer.appendChild(el);
      const total = (parseFloat(dur) + parseFloat(delay)) * 1000 + 600;
      setTimeout(() => el.remove(), total);
    }

    function startFlowers() {
      for (let i = 0; i < 8; i++) setTimeout(spawnFlower, i * 180);
      setInterval(spawnFlower, 800);
    }

    /* ===================== MAQUINA DE ESCRIBIR ===================== */
    function startTyping() {
      const textEl = document.getElementById('text');
      const cur = document.getElementById('cur');
      const box = document.getElementById('box');
      let i = 0;
      function next() {
        if (i < LETTER.length) {
          textEl.insertBefore(document.createTextNode(LETTER[i]), cur);
          i++;
          box.scrollTop = box.scrollHeight;
          if (i === 80) {
            const h = document.getElementById('hint');
            h.style.opacity = '1';
            setTimeout(() => h.style.opacity = '0', 4000);
          }
          setTimeout(next, CHAR_MS);
        } else {
          cur.style.display = 'none';
        }
      }
      setTimeout(next, 1600);
    }

    /* ===================== MUSICA ===================== */
    function startMusic() {
      const audio = document.getElementById('music');
      audio.volume = 0.8;
      audio.play().catch(() => { });
    }

    /* ===================== INICIO ===================== */
    function startExperience() {
      document.getElementById('intro').classList.add('out');
      const scene = document.getElementById('scene');
      scene.style.display = 'block';
      startMusic();
      startFlowers();
      startTyping();
    }
  </script>
</body>

</html>
